<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YRGO:XP</title>

    <!-- Heading font -->
     <link href="https://fonts.cdnfonts.com/css/blrrpix" rel="stylesheet">
    <!-- Body font -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">


  </head>
  <body>
    <script>
      // Initialize color theme before React mounts to prevent light-first flash
      // Reads from localStorage first, then falls back to system prefers-color-scheme
      (function() {
        const savedMode = localStorage.getItem('colorMode');
        if (savedMode === 'dark' || savedMode === 'light') {
          document.documentElement.setAttribute('data-theme', savedMode);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
